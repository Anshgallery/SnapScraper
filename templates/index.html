<!DOCTYPE html>
<html>
<head>
    <title>Image Scraper</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }

        form {
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 10px;
            width: 300px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }

        img {
            width: 200px;
            margin: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>Google Image Scraper</h1>

    <form method="POST" action="/image">
        <input type="text" name="query" placeholder="Enter search term..." required>
        <button type="submit">Search</button>
    </form>

    {% if result %}
        <h2>{{ result }}</h2>
    {% endif %}

</body>
</html>
